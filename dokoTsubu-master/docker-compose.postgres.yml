services:
  postgres:
    image: postgres:17-alpine
    container_name: shiftflow-postgres-dev
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: shiftflow_dev
      POSTGRES_USER: shiftflow
      POSTGRES_PASSWORD: shiftflow_dev_password
    volumes:
      - shiftflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shiftflow -d shiftflow_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  shiftflow_pg_data:
