name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Prepare servlet API
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .ci-tomcat/lib | Out-Null
          mvn dependency:copy "-Dartifact=jakarta.servlet:jakarta.servlet-api:6.0.0" "-DoutputDirectory=$PWD/.ci-tomcat/lib" "-Dmdep.stripVersion=true"
          Move-Item .ci-tomcat/lib/jakarta.servlet-api.jar .ci-tomcat/lib/servlet-api.jar
      - name: Static analysis, build, and tests
        shell: pwsh
        run: .\ci.ps1 -TomcatHome "$PWD\.ci-tomcat" -JavaHome $env:JAVA_HOME

